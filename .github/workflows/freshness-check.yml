name: Monthly Golden-Copy Freshness Check

# Runs on the 1st of each month. Fetches the 22 statute-class sources from the
# NY Open Legislation API and diffs them against the golden copy.
#   * all FULL-MATCH  -> commit the dated report to main, no PR.
#   * any DIVERGENT or sunset mismatch -> open a draft PR labeled
#     "freshness-drift" with the report. NEVER auto-merges, NEVER rewrites
#     golden-copy source files.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC, 1st of each month
  workflow_dispatch: {}    # allow manual runs

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: freshness-check
  cancel-in-progress: false

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run freshness check
        id: check
        env:
          NYSLEG_API_KEY: ${{ secrets.NYSLEG_API_KEY }}
        # --write-state writes the REAL runtime freshness-state; the script also
        # emits state_change=true ONLY on a material verdict-class transition
        # (or the first replacement of the checked-in seed), gating the PR below.
        run: python3 scripts/freshness_check.py --write-state data/config/freshness-state.json

      # ---- PRECEDENCE — exactly ONE create-pull-request step runs per job, so
      #      the report file the PR body-path references is never consumed by a
      #      prior step (the bug that failed run 29173735139):
      #        state-update (material)  >  drift report  >  clean report.
      #      Total mapping of (drift, state_change):
      #        (false,false)->clean   (true,false)->drift
      #        (false,true)->state    (true,true)->state (carries report+state)
      # ---- Clean, NON-material: open a (non-draft) PR with the report. main is
      #      branch-protected and requires PRs, so we cannot push directly. ------
      - name: Open freshness-clean PR (no drift)
        if: steps.check.outputs.drift == 'false' && steps.check.outputs.state_change != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: docs/freshness/
          branch: freshness-clean/${{ steps.check.outputs.date }}
          base: main
          title: "Freshness check clean — ${{ steps.check.outputs.date }} (all FULL-MATCH)"
          body-path: ${{ steps.check.outputs.report }}
          labels: freshness-clean
          draft: false
          commit-message: "freshness: monthly report ${{ steps.check.outputs.date }} (all FULL-MATCH)"

      # ---- Drift WITHOUT a material verdict-class change (e.g. a sunset
      #      mismatch, verdicts unchanged): labeled draft report PR. Never
      #      auto-merge. (A drift that IS a class change is handled by the
      #      state-update step below, which carries this same report.) ----------
      - name: Open freshness-drift PR
        if: steps.check.outputs.drift == 'true' && steps.check.outputs.state_change != 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: docs/freshness/
          branch: freshness-drift/${{ steps.check.outputs.date }}
          base: main
          title: "Freshness drift detected — ${{ steps.check.outputs.date }}"
          body-path: ${{ steps.check.outputs.report }}
          labels: freshness-drift
          draft: true
          commit-message: "freshness: drift report ${{ steps.check.outputs.date }}"

      # ---- Material verdict change (TAKES PRECEDENCE over the two report steps
      #      above): open a HUMAN-REVIEWED draft PR that updates the runtime
      #      freshness-state file AND carries the report (add-paths includes both),
      #      so the body-path report always exists — no prior step consumed it.
      #      MERGING it is what flips runtime citability, so it is a DRAFT and is
      #      NEVER auto-merged (the job has no merge step and create-pull-request
      #      cannot merge). Fires ONLY when a per-source verdict CLASS changed
      #      (state_change=true); a byte diff with the same verdicts is a no-op. --
      - name: Open freshness state-update PR (material verdict change)
        if: steps.check.outputs.state_change == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            data/config/freshness-state.json
            docs/freshness/
          branch: freshness-state-update/${{ steps.check.outputs.date }}
          base: main
          title: "Freshness state update — ${{ steps.check.outputs.date }} (verdict change; review before merge)"
          body-path: ${{ steps.check.outputs.report }}
          labels: freshness-state-update
          draft: true
          commit-message: "freshness: state update ${{ steps.check.outputs.date }} (material verdict change)"
